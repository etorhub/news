<article>
  <h2 style="font-size: var(--font-article);">{{ article.title }}</h2>
  <p><small>
    {% if article.sources %}
      Sources:
      {% for src in article.sources %}
        <a href="{{ src.url }}" target="_blank" rel="noopener">{{ src.source_name }}</a>{% if not loop.last %}, {% endif %}
      {% endfor %}
    {% endif %}
  </small></p>
  {% if article.summary %}
  <p>{{ article.summary }}</p>
  {% endif %}
  <p>
    {% if article.sources %}
      <a href="{{ article.sources[0].url }}" target="_blank" rel="noopener">Read original</a>
    {% endif %}
    <button type="button" class="btn tts-only" aria-label="Read aloud"
      onclick="speak({{ (article.title + '. ' + (article.summary or '')) | tojson }})">Listen</button>
    <button type="button" class="btn"
      hx-get="{{ url_for('reader.expand_cluster', cluster_id=article.id) }}"
      hx-target="#article-{{ article.id }}"
      hx-swap="innerHTML">Read more</button>
  </p>
</article>
