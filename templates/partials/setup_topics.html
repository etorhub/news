<div class="topic-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem;">
  {% for topic in topics %}
  <label style="display: flex; align-items: center; gap: 0.5rem; min-height: 44px;">
    <input type="checkbox" name="topics" value="{{ topic }}"
      {% if not profile or topic in (profile.topic_ids or []) %}checked{% endif %}>
    <span>{{ topic }}</span>
  </label>
  {% endfor %}
</div>
