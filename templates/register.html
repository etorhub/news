{% extends "base.html" %}
{% block title %}Register — Accessible News{% endblock %}
{% block content %}
<h1>Register</h1>
{% if error %}
<p style="color: #c00;">{{ error }}</p>
{% endif %}
<form method="post" action="{{ url_for('auth.register') }}">
  <p>
    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required autocomplete="email">
  </p>
  <p>
    <label for="password">Password (at least 8 characters)</label><br>
    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
  </p>
  <p>
    <button type="submit">Register</button>
  </p>
</form>
<p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
{% endblock %}
