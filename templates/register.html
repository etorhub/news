{% extends "base.html" %}
{% block title %}{{ _('Register') }} — {{ _('Accessible News') }}{% endblock %}
{% block content %}
<h1>{{ _('Register') }}</h1>
{% if error %}
<p style="color: #c00;">{{ error }}</p>
{% endif %}
<form method="post" action="{{ url_for('auth.register') }}">
  <p>
    <label for="email">{{ _('Email') }}</label><br>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required autocomplete="email">
  </p>
  <p>
    <label for="password">{{ _('Password (at least 8 characters)') }}</label><br>
    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
  </p>
  <p>
    <button type="submit">{{ _('Register') }}</button>
  </p>
</form>
<p>{{ _('Already have an account?') }} <a href="{{ url_for('auth.login') }}">{{ _('Log in') }}</a></p>
{% endblock %}
