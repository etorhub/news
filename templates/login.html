{% extends "base.html" %}
{% block title %}{{ _('Log in') }} — {{ _('Accessible News') }}{% endblock %}
{% block content %}
<h1>{{ _('Log in') }}</h1>
{% if error %}
<p style="color: #c00;">{{ error }}</p>
{% endif %}
<form method="post" action="{{ url_for('auth.login') }}">
  <p>
    <label for="email">{{ _('Email') }}</label><br>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required autocomplete="email">
  </p>
  <p>
    <label for="password">{{ _('Password') }}</label><br>
    <input type="password" id="password" name="password" required autocomplete="current-password">
  </p>
  <p>
    <button type="submit">{{ _('Log in') }}</button>
  </p>
</form>
<p>{{ _("Don't have an account?") }} <a href="{{ url_for('auth.register') }}">{{ _('Register') }}</a></p>
{% endblock %}
