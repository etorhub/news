<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Accessible News{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root {
      --bg: #f5f5f0;
      --fg: #1a1a1a;
      --accent: #2c5282;
      --border: #ccc;
      --touch-min: 44px;
      --font-base: 1.25rem;
      --font-article: 1.5rem;
    }
    body.high-contrast {
      --bg: #000;
      --fg: #fff;
      --accent: #7eb8ff;
      --border: #666;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Courier Prime", "Courier New", monospace;
      font-size: var(--font-base);
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
      padding: 1rem;
      min-height: 100vh;
    }
    a {
      color: var(--accent);
      text-decoration: underline;
    }
    a:hover { text-decoration: none; }
    button, input[type="submit"], .btn {
      min-height: var(--touch-min);
      min-width: var(--touch-min);
      padding: 0.75rem 1.5rem;
      font-family: inherit;
      font-size: var(--font-base);
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--fg);
    }
    button:hover, input[type="submit"]:hover, .btn:hover {
      background: var(--fg);
      color: var(--bg);
    }
    input[type="text"], input[type="email"], input[type="password"], select, textarea {
      min-height: var(--touch-min);
      padding: 0.75rem;
      font-family: inherit;
      font-size: var(--font-base);
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--fg);
    }
    input[type="checkbox"] {
      min-width: 24px;
      min-height: 24px;
      cursor: pointer;
    }
    nav {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    nav a, nav form {
      display: inline-block;
      margin-right: 1rem;
      min-height: var(--touch-min);
      line-height: var(--touch-min);
    }
    nav .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-left: auto;
    }
    .tts-only { display: none; }
    body.tts-available .tts-only { display: inline-block; }
    .feed-loading-dots {
      display: inline-block;
      width: 1em;
      text-align: left;
      animation: feed-loading-pulse 1.5s ease-in-out infinite;
    }
    .feed-loading-dots::before {
      content: "...";
    }
    @keyframes feed-loading-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .article-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--border), var(--bg));
    }
    .article-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .article-cover-credit {
      position: absolute;
      bottom: 0.25rem;
      right: 0.25rem;
      padding: 0.15rem 0.4rem;
      font-size: 0.7rem;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border-radius: 4px;
    }
    .article-cover.no-image img {
      display: none;
    }
    .article-cover.no-image .article-cover-credit {
      display: none;
    }
    /* Desktop layout: constrained width, centered content, well-fitted images */
    @media (min-width: 768px) {
      main {
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
        padding-left: 2rem;
        padding-right: 2rem;
      }
      #article-list,
      #archive-list {
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }
      .article-card {
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--border);
      }
      .article-card:last-child {
        border-bottom: none;
      }
      .article-cover {
        max-height: 360px;
        margin-bottom: 1rem;
      }
      .article-cover img {
        object-fit: cover;
        object-position: center;
      }
      .article-card h2,
      .article-card p {
        max-width: 65ch;
      }
      nav {
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 2rem;
        padding-left: 2rem;
        padding-right: 2rem;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="{% if profile and profile.high_contrast %}high-contrast {% endif %}{% if request and request.cookies.get('tts_available') %}tts-available{% endif %}">
  <nav>
    {% if session.get('user_id') %}
      <div>
        <a href="{{ url_for('reader.index') }}">Feed</a>
        <a href="{{ url_for('reader.archive') }}">Archive</a>
        <a href="{{ url_for('settings.settings_page') }}">Settings</a>
        {% if is_admin %}<a href="{{ url_for('admin.dashboard') }}">Admin</a>{% endif %}
      </div>
      <div class="nav-right">
        {% if current_user_email %}<span>{{ current_user_email }}</span>{% endif %}
        <form method="post" action="{{ url_for('auth.logout') }}" style="display:inline;">
          <button type="submit">Log out</button>
        </form>
      </div>
    {% else %}
      <div>
        <a href="{{ url_for('auth.login') }}">Log in</a>
        <a href="{{ url_for('auth.register') }}">Register</a>
      </div>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (function() {
      if ('speechSynthesis' in window) {
        document.cookie = 'tts_available=1; path=/; max-age=86400';
        document.body.classList.add('tts-available');
      }
    })();
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(u);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
