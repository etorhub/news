<table style="width: 100%; border-collapse: collapse; margin-top: 0.5rem;">
  <thead>
    <tr>
      <th style="text-align: left; padding: 0.5rem; border: 1px solid var(--border);">#</th>
      <th style="text-align: left; padding: 0.5rem; border: 1px solid var(--border);">Title</th>
      <th style="text-align: left; padding: 0.5rem; border: 1px solid var(--border);">Source</th>
      <th style="text-align: left; padding: 0.5rem; border: 1px solid var(--border);">URL</th>
    </tr>
  </thead>
  <tbody>
    {% for a in articles %}
    <tr>
      <td style="padding: 0.5rem; border: 1px solid var(--border);">{{ a.position + 1 }}</td>
      <td style="padding: 0.5rem; border: 1px solid var(--border);">{{ (a.title or '')[:60] }}{% if (a.title or '')|length > 60 %}…{% endif %}</td>
      <td style="padding: 0.5rem; border: 1px solid var(--border);">{{ a.source_name or a.source_id or '—' }}</td>
      <td style="padding: 0.5rem; border: 1px solid var(--border);"><a href="{{ a.url }}" target="_blank" rel="noopener"><small>Link</small></a></td>
    </tr>
    {% else %}
    <tr>
      <td colspan="4" style="padding: 0.5rem;">No articles in story</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
