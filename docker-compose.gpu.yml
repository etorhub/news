# GPU override: use when NVIDIA drivers are available
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# GPU is assigned to ollama (LLM/embeddings); worker stays CPU-only.
services:
  ollama:
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_DEBUG: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
