services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull qwen2.5:7b && ollama pull nomic-embed-text"]
    restart: "no"

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: news
      POSTGRES_USER: news
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://news:${POSTGRES_PASSWORD}@db:5432/news
      POSTGRES_HOST: db
    volumes:
      - ./config:/app/config
    command: >
      sh -c "alembic upgrade head && gunicorn -b 0.0.0.0:5000 app:application"

  worker:
    build:
      context: .
      target: worker
    depends_on:
      db:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://news:${POSTGRES_PASSWORD}@db:5432/news
      POSTGRES_HOST: db
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./config:/app/config
    command: python -m app.scheduler

volumes:
  pgdata:
  ollama_data:
