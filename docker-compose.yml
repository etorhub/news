services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: news
      POSTGRES_USER: news
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://news:${POSTGRES_PASSWORD}@db:5432/news
      POSTGRES_HOST: db
    volumes:
      - ./config:/app/config
    command: >
      sh -c "alembic upgrade head && gunicorn -b 0.0.0.0:5000 app:create_app"

  scheduler:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://news:${POSTGRES_PASSWORD}@db:5432/news
      POSTGRES_HOST: db
    volumes:
      - ./config:/app/config
    command: python -m app.scheduler

volumes:
  pgdata:
