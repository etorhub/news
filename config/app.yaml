llm:
  provider: anthropic        # anthropic | openai | gemini
  model: claude-sonnet-4-20250514

embeddings:
  provider: local   # sentence-transformers
  model: paraphrase-multilingual-MiniLM-L12-v2

schedule:
  fetch_interval_minutes: 60
  # Pipeline order: fetch -> enrichment -> cluster -> rewrite
  enrichment_cron: "5 * * * *"   # Hourly at :05 (after fetch at :00)
  cluster_cron: "15 * * * *"    # Hourly at :15 (after enrichment)
  rewrite_cron: "0 6 * * *"   # Daily at 6am
  rewrite_batch_size: 10
  fetcher:
    circuit_breaker_threshold: 5
    request_timeout_seconds: 30
    user_agent: "AccessibleNewsAggregator/0.1 (+https://github.com/accessible-news/aggregator)"

extraction:
  enabled: true
  min_content_length: 200
  batch_size: 30
  rate_limit_per_domain: 2.0
  timeout: 30

processing:
  articles_per_day: 10
  summary_sentences: 3
  cluster_window_hours: 24
  cluster_similarity_threshold: 0.82
  embed_batch_size: 50

server:
  port: 5000
  debug: false
