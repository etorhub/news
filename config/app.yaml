llm:
  provider: ollama
  model: qwen2.5:7b
  host: http://ollama:11434

# Cluster-level rewriting: one rewrite per (cluster, style, language).
# Styles and languages are extensible via config.
rewriting:
  styles:
    - id: neutral
      label: Neutral
      prompt: rewrite_cluster_neutral
    - id: simple
      label: Simple
      prompt: rewrite_cluster_simple
  languages:
    - id: ca
      label: Catalan
    - id: es
      label: Spanish
    - id: en
      label: English
  # Fallback when user's preferred (style, language) is not yet available
  default_style: neutral
  default_language: ca

embeddings:
  provider: ollama
  model: nomic-embed-text
  host: http://ollama:11434

schedule:
  fetch_interval_minutes: 60
  # Pipeline order: fetch -> enrichment -> cluster -> rewrite
  enrichment_cron: "5 * * * *"   # Hourly at :05 (after fetch at :00)
  cluster_cron: "15 * * * *"    # Hourly at :15 (after enrichment)
  rewrite_cron: "0 6 * * *"   # Daily at 6am
  # Higher batch when showing all clusters; more rewrites per run
  rewrite_batch_size: 50
  # Parallel workers for rewrite. Ollama serializes internally; 1 avoids overloading.
  rewrite_parallel_workers: 1
  fetcher:
    circuit_breaker_threshold: 5
    request_timeout_seconds: 30
    user_agent: "AccessibleNewsAggregator/0.1 (+https://github.com/accessible-news/aggregator)"

extraction:
  enabled: true
  min_content_length: 200
  batch_size: 30
  rate_limit_per_domain: 2.0
  timeout: 30

processing:
  # 0 = no limit; show every cluster with a rewrite
  articles_per_day: 0
  summary_sentences: 3
  # Max tokens for rewrite output. Lower = faster local inference (default 2000).
  rewrite_max_tokens: 2000
  # 0 = all clusters regardless of freshness
  cluster_window_hours: 0
  cluster_similarity_threshold: 0.82
  embed_batch_size: 50

relevance:
  weights:
    recency: 0.20
    coverage: 0.35
    topic_affinity: 0.20
    source_affinity: 0.15
    content_quality: 0.10
  recency_half_life_hours: 8
  coverage_cap: 4
  # 1 = single-source clusters same priority as multi-source
  min_sources: 1

server:
  port: 5000
  debug: false

# Topic labels and icons for section navigation. Keys must match topic ids in sources.
# short: compact label for nav (used when space is limited)
topics:
  general: { label: General, short: All, emoji: "📰" }
  politics: { label: Politics, short: Pol, emoji: "🏛️" }
  society: { label: Society, short: Soc, emoji: "👥" }
  culture: { label: Culture, short: Cul, emoji: "🎭" }
  international: { label: International, short: Int, emoji: "🌍" }
  economy: { label: Economy, short: Eco, emoji: "📈" }
  science: { label: Science, short: Sci, emoji: "🔬" }
  sports: { label: Sports, short: Spo, emoji: "⚽" }
