llm:
  provider: ollama
  model: qwen2.5:7b  # fallback for any task without its own model
  # Per-task models (cascade: rewrite → simplify → translate). Fall back to model when unset.
  rewrite_model: qwen2.5:7b   # merge sources → neutral EN (hardest task, use best model)
  simplify_model: qwen2.5:7b   # neutral EN → simple EN (moderate complexity)
  translate_model: qwen2.5:7b  # translate to other languages (simpler, can use faster model)
  host: http://ollama:11434

# Story-level rewriting: one rewrite per (story, style, language).
# Styles and languages are extensible via config.
# Cascade: generate neutral EN from sources, simplify to simple EN, translate both to other languages.
rewriting:
  base_language: en
  styles:
    - id: neutral
      label: Neutral
      prompt: rewrite_cluster_neutral
    - id: simple
      label: Simple
      prompt: rewrite_cluster_simple
  languages:
    - id: ca
      label: Catalan
    - id: es
      label: Spanish
    - id: en
      label: English
  # Fallback when user's preferred (style, language) is not yet available
  default_style: neutral
  default_language: ca

embeddings:
  provider: ollama
  model: nomic-embed-text
  host: http://ollama:11434

schedule:
  fetch_interval_minutes: 60
  # Pipeline order: fetch -> enrichment -> cluster -> rewrite
  enrichment_cron: "5 * * * *"   # Hourly at :05 (after fetch at :00)
  cluster_cron: "15 * * * *"    # Hourly at :15 (after enrichment)
  # Articles older than this are not fetched (0 = no limit)
  max_article_age_hours: 24
  rewrite_cron: "0 6 * * *"   # Daily at 6am
  # Higher batch when showing all stories; more rewrites per run
  rewrite_batch_size: 50
  # Parallel workers for rewrite. Ollama serializes internally; 1 avoids overloading.
  rewrite_parallel_workers: 1
  fetcher:
    circuit_breaker_threshold: 5
    request_timeout_seconds: 30
    user_agent: "AccessibleNewsAggregator/0.1 (+https://github.com/accessible-news/aggregator)"

extraction:
  enabled: true
  min_content_length: 200
  batch_size: 30
  max_enrichment_rounds: 20  # Cap per run to avoid runaway loops
  rate_limit_per_domain: 2.0
  timeout: 30

processing:
  # 0 = no limit; show every story with a rewrite
  articles_per_day: 0
  summary_sentences: 3
  # Max tokens for rewrite output. Lower = faster local inference (default 2000).
  rewrite_max_tokens: 2000
  # 0 = all stories regardless of freshness
  cluster_window_hours: 0
  cluster_similarity_threshold: 0.82
  story_similarity_threshold: 0.82
  story_min_sources: 2
  embed_batch_size: 50

relevance:
  weights:
    recency: 0.20
    coverage: 0.35
    topic_affinity: 0.20
    source_affinity: 0.15
    content_quality: 0.10
  recency_half_life_hours: 8
  coverage_cap: 4
  # 1 = single-source clusters same priority as multi-source
  min_sources: 1

server:
  port: 5000
  debug: false

# Topic labels, icons and emojis. Keys must match topic ids in sources.
# label: full display name (no abbreviations)
# icon: SVG icon name (newspaper, building, users, palette, globe, trending-up, flask, trophy)
# emoji: for setup/settings topic selector
topics:
  general: { label: General, icon: newspaper, emoji: "📰" }
  politics: { label: Politics, icon: building, emoji: "🏛️" }
  society: { label: Society, icon: users, emoji: "👥" }
  culture: { label: Culture, icon: palette, emoji: "🎭" }
  international: { label: International, icon: globe, emoji: "🌍" }
  economy: { label: Economy, icon: trending-up, emoji: "📈" }
  science: { label: Science, icon: flask, emoji: "🔬" }
  sports: { label: Sports, icon: trophy, emoji: "⚽" }
