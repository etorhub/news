llm:
  provider: local           # anthropic | openai | gemini | local
  model: Qwen/Qwen2.5-1.5B-Instruct
  # model_path: /path/to/local/model   # optional, for air-gapped
  # device: cpu   # or cuda

embeddings:
  provider: local   # sentence-transformers
  model: paraphrase-multilingual-MiniLM-L12-v2

schedule:
  fetch_interval_minutes: 60
  # Pipeline order: fetch -> enrichment -> cluster -> rewrite
  enrichment_cron: "5 * * * *"   # Hourly at :05 (after fetch at :00)
  cluster_cron: "15 * * * *"    # Hourly at :15 (after enrichment)
  rewrite_cron: "0 6 * * *"   # Daily at 6am
  rewrite_batch_size: 10
  fetcher:
    circuit_breaker_threshold: 5
    request_timeout_seconds: 30
    user_agent: "AccessibleNewsAggregator/0.1 (+https://github.com/accessible-news/aggregator)"

extraction:
  enabled: true
  min_content_length: 200
  batch_size: 30
  rate_limit_per_domain: 2.0
  timeout: 30

processing:
  articles_per_day: 10
  summary_sentences: 3
  cluster_window_hours: 24
  cluster_similarity_threshold: 0.82
  embed_batch_size: 50

relevance:
  weights:
    recency: 0.30
    coverage: 0.25
    topic_affinity: 0.20
    source_affinity: 0.15
    content_quality: 0.10
  recency_half_life_hours: 8
  coverage_cap: 4

server:
  port: 5000
  debug: false
