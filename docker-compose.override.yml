# Dev overrides: bind mounts for live reload, flask run --debug
services:
  ops:
    volumes:
      - .:/app
    command: flask --app ops:application run --host 0.0.0.0 --port 5001 --debug

  web:
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && flask seed-sources && flask run --host 0.0.0.0 --debug"
    ports:
      - "5000:5000"
      - "5678:5678"

  worker:
    volumes:
      - .:/app
