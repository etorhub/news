<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ops Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    .sidebar { min-height: 100vh; background: #f8f9fa; }
    .nav-link { padding: 0.5rem 1rem; }
    .table td, .table th { vertical-align: middle; }
    .badge-done { background-color: #198754; }
    .badge-failed { background-color: #dc3545; }
    .badge-missing { background-color: #6c757d; }
    .badge-available { background-color: #198754; }
    .badge-unavailable { background-color: #dc3545; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 sidebar border-end py-3">
        <h6 class="px-3 mb-3 text-muted">Ops Dashboard</h6>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard.index') }}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('jobs.index') }}">Jobs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('sources.index') }}">Sources</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('articles.index') }}">Articles</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('stories.index') }}">Stories</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('users.index') }}">Users</a>
          </li>
        </ul>
      </nav>
      <main class="col-md-10 py-4">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
